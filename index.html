<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes"><meta name="theme-color" content="#0f0f13" id="themeColor">
<title>TeleDrive Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body class="dark">

<div id="loadingScreen" class="loading-screen"><div class="loader-content"><div class="loader-ring"></div><i class="fa-solid fa-cloud text-3xl text-blue-500"></i><p>TeleDrive</p></div></div>

<div id="loginScreen" class="login-screen" style="display:none">
  <div class="login-bg"><div class="blob blob1"></div><div class="blob blob2"></div><div class="blob blob3"></div></div>
  <div class="login-card">
    <div class="login-logo"><i class="fa-solid fa-cloud-arrow-up text-xl"></i></div>
    <h1>TeleDrive</h1><p class="login-sub">Secure Login</p>
    <div id="step1">
      <div class="input-group"><label>Username</label><input type="text" id="usernameInput" autocomplete="off"></div>
      <div class="input-group"><label>Password</label><div class="pass-wrap"><input type="password" id="passwordInput"><button class="eye-btn" onclick="togglePass('passwordInput','eyeIcon')"><i class="fa-solid fa-eye" id="eyeIcon"></i></button></div></div>
      <button class="btn-primary" id="loginBtn" onclick="requestOTP()">Continue</button>
      <div class="login-error" id="loginError"></div>
    </div>
    <div id="step2" style="display:none">
      <div class="otp-inputs">
        <input class="otp-box" maxlength="1"><input class="otp-box" maxlength="1"><input class="otp-box" maxlength="1"><input class="otp-box" maxlength="1"><input class="otp-box" maxlength="1"><input class="otp-box" maxlength="1">
      </div>
      <button class="btn-primary" onclick="verifyOTP()">Verify</button>
      <div class="login-error" id="otpError"></div>
    </div>
  </div>
</div>

<div id="driveContent" style="display:none">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><i class="fa-solid fa-shield-halved text-blue-500"></i><span>TeleDrive</span></div>
    <nav class="sidebar-nav">
      <a class="nav-item active" id="navDrive" onclick="switchView('drive')"><i class="fa-solid fa-house"></i> My Drive</a>
      <a class="nav-item" onclick="showSearch()"><i class="fa-solid fa-magnifying-glass"></i> Search</a>
      <a class="nav-item text-red-400" id="navTrash" onclick="switchView('trash')"><i class="fa-solid fa-trash-can"></i> Trash</a>
      <a class="nav-item" id="navSettings" onclick="switchView('settings')"><i class="fa-solid fa-gear"></i> Settings</a>
    </nav>
    <div class="sidebar-bottom">
      <button class="theme-toggle-btn" onclick="toggleTheme()"><span id="themeIconSidebar">🌙</span></button>
      <button class="btn-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <main class="main-content" id="mainArea">
    <div class="topbar">
      <div class="topbar-left">
        <button class="hamburger" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
        <div class="breadcrumb" id="breadcrumb"></div>
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" style="position:relative" onclick="toggleUploadPanel()">
            <i class="fa-solid fa-bell"></i><span id="taskBadge" style="display:none" class="badge">0</span>
        </button>
        <select id="sortSelect" onchange="sortFiles()" class="sort-select">
            <option value="date-desc">Newest First</option>
            <option value="name-asc">Name (A-Z)</option>
            <option value="size-desc">Size (Large)</option>
        </select>
        <button class="icon-btn" onclick="toggleView()"><i class="fa-solid fa-grid-2"></i></button>
      </div>
    </div>

    <div class="task-panel" id="taskPanel" style="display:none;">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <h4>Uploads</h4>
            <button class="btn-ghost" style="padding:4px 8px; font-size:0.7rem; margin:0;" onclick="cancelAllUploads()">Cancel All</button>
        </div>
        <div id="uploadTasksList"></div>
    </div>

    <div class="search-row" id="searchRow" style="display:none"><div class="search-box"><input type="text" id="searchInput" placeholder="Search..." oninput="searchFiles()"><button onclick="hideSearch()">✕</button></div></div>
    
    <div class="desktop-toolbar" id="mainToolbar">
      <button class="btn-new-folder" onclick="createFolder()"><i class="fa-solid fa-folder-plus text-amber-500"></i> New Folder</button>
      <label class="btn-upload" for="filePicker"><i class="fa-solid fa-cloud-arrow-up"></i> Upload</label>
    </div>
    <input type="file" id="filePicker" style="display:none" multiple>

    <div class="file-area">
      <div class="empty-state" id="emptyState" style="display:none"><i id="emptyIcon" class="fa-solid fa-folder-open text-5xl"></i><p id="emptyTitle">Empty</p></div>
      <div class="file-grid" id="fileList"></div>
    </div>

    <div id="settingsArea" style="display:none; max-width: 400px; margin: auto; background: var(--surface2); padding: 24px; border-radius: 16px;">
        <h3 style="margin-bottom:20px;"><i class="fa-solid fa-shield"></i> Security Settings</h3>
        <div class="input-group"><label>Current Password</label><input type="password" id="currPass"></div>
        <div class="input-group"><label>New Password</label><input type="password" id="newPass"></div>
        <button class="btn-primary" onclick="changePassword()">Update Password</button>
    </div>
  </main>

  <div class="floating-action-bar" id="actionBar" style="display:none">
    <div style="display:flex; align-items:center; gap:10px;"><button onclick="clearSelection()" class="ab-btn">✕</button><span id="selectedCount">0</span></div>
    <div style="display:flex; gap:6px;" id="actionBarTools"></div>
  </div>
</div>

<div class="context-menu" id="contextMenu"></div>
<div class="modal-overlay" id="confirmModal" style="display:none; z-index:3000;"><div class="modal text-center"><h3 id="confirmTitle">Are you sure?</h3><div style="display:flex; gap:12px; margin-top:20px;"><button class="btn-ghost flex-1" onclick="document.getElementById('confirmModal').style.display='none'">Cancel</button><button class="btn-primary flex-1 bg-red-500" id="confirmYesBtn">Yes</button></div></div></div>
<div class="modal-overlay" id="renameModal" style="display:none;"><div class="modal"><h3>Rename</h3><input type="text" id="renameInput" class="rename-input"><div class="modal-actions"><button class="btn-ghost" onclick="document.getElementById('renameModal').style.display='none'">Cancel</button><button class="btn-primary" onclick="submitRename()">Save</button></div></div></div>
<div class="modal-overlay preview-overlay" id="previewModal" style="display:none;"><button class="preview-close" onclick="document.getElementById('previewModal').style.display='none'"><i class="fa-solid fa-xmark"></i></button><div class="preview-content-box" id="previewContent"></div><div class="preview-title" id="previewTitle"></div></div>
<div class="modal-overlay" id="moveModal" style="display:none" onclick="if(event.target===this)this.style.display='none'"><div class="modal"><h3>Move</h3><div id="folderPickerList" style="max-height: 250px; overflow-y: auto; margin-bottom: 16px;"></div><button class="btn-ghost" onclick="document.getElementById('moveModal').style.display='none'">Cancel</button></div></div>

<script src="script.js"></script>
</body>
</html>

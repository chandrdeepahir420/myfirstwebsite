<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TeleDrive">
<meta name="theme-color" content="#0f0f13" id="themeColor">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%236c63ff'/><path d='M20 38 L50 18 L80 38 V78 A4 4 0 0 1 76 82 H24 A4 4 0 0 1 20 82 Z' fill='white'/></svg>">
<title>TeleDrive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="dark">

<div id="loadingScreen" class="loading-screen">
  <div class="loader-content">
    <div class="loader-icon">
      <div class="loader-ring"></div>
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21.2 8.4c.5.38.8.97.8 1.6v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V10a2 2 0 0 1 .8-1.6l8-6a2 2 0 0 1 2.4 0l8 6Z"/></svg>
    </div>
    <p>TeleDrive</p>
  </div>
</div>

<div id="loginScreen" class="login-screen" style="display:none">
  <div class="login-bg">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
  </div>
  <div class="login-card">
    <div class="theme-toggle-login" onclick="toggleTheme()">
      <span id="themeIconLogin">🌙</span>
    </div>
    <div class="login-logo">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.2 8.4c.5.38.8.97.8 1.6v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V10a2 2 0 0 1 .8-1.6l8-6a2 2 0 0 1 2.4 0l8 6Z"/></svg>
    </div>
    <h1>TeleDrive</h1>
    <p class="login-sub">Your personal cloud, powered by Telegram</p>
    
    <div id="step1">
      <div class="input-group">
        <label>Username</label>
        <input type="text" id="usernameInput" placeholder="Enter username" autocomplete="username" autocapitalize="none">
      </div>
      <div class="input-group">
        <label>Password</label>
        <div class="pass-wrap">
          <input type="password" id="passwordInput" placeholder="Enter password" autocomplete="current-password">
          <button class="eye-btn" onclick="togglePass()" type="button" tabindex="-1">
            <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button class="btn-primary" id="loginBtn" onclick="requestOTP()">
        <span>Continue</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
      <div class="login-error" id="loginError"></div>
    </div>

    <div id="step2" style="display:none">
      <div class="otp-info">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.2 8.4c.5.38.8.97.8 1.6v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V10a2 2 0 0 1 .8-1.6l8-6a2 2 0 0 1 2.4 0l8 6Z"/></svg>
        <span>OTP aapke Telegram par bheja gaya</span>
      </div>
      <div class="otp-inputs">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
      </div>
      <button class="btn-primary" id="verifyBtn" onclick="verifyOTP()">
        <span>Verify & Login</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
      </button>
      <button class="btn-ghost" onclick="backToStep1()">← Back</button>
      <div class="login-error" id="otpError"></div>
    </div>
  </div>
</div>

<div id="driveContent" style="display:none">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.2 8.4c.5.38.8.97.8 1.6v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V10a2 2 0 0 1 .8-1.6l8-6a2 2 0 0 1 2.4 0l8 6Z"/></svg>
      <span>TeleDrive</span>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item active" id="navDrive" onclick="navigateTo('root')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        My Drive
      </a>
      <a class="nav-item" onclick="showSearch()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        Search
      </a>
    </nav>
    <div class="sidebar-bottom">
      <div class="storage-info">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        Unlimited Storage
      </div>
      <button class="theme-toggle-btn" onclick="toggleTheme()">
        <span id="themeIconSidebar">🌙</span>
        <span id="themeLabel">Dark Mode</span>
      </button>
      <button class="btn-logout" onclick="logout()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        Logout
      </button>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <main class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="hamburger" onclick="toggleSidebar()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="breadcrumb" id="breadcrumb">
          <span onclick="navigateTo('root')">My Drive</span>
        </div>
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" onclick="showSearch()" id="searchToggle" title="Search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
        <button class="icon-btn" onclick="toggleTheme()" title="Theme" id="themeBtn">🌙</button>
        <button class="icon-btn" onclick="toggleView()" id="viewToggle" title="Toggle view">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        </button>
      </div>
    </div>

    <div class="search-row" id="searchRow" style="display:none">
      <div class="search-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Search files..." oninput="searchFiles()">
        <button onclick="hideSearch()">✕</button>
      </div>
    </div>

    <div class="action-bar" id="actionBar" style="display:none">
      <div class="action-bar-left">
        <button onclick="clearSelection()" class="ab-btn">✕</button>
        <span id="selectedCount">0 selected</span>
      </div>
      <div class="action-bar-right">
        <button class="ab-btn" onclick="bulkDownload()" title="Download"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg></button>
        <button class="ab-btn" onclick="bulkMove()" title="Move"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></button>
        <button class="ab-btn danger" onclick="bulkDelete()" title="Delete"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>
        <button class="ab-btn" onclick="selectAll()">All</button>
      </div>
    </div>

    <div class="fab-group">
      <button class="fab fab-folder" onclick="createFolder()"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg></button>
      <label class="fab fab-upload" for="filePicker"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg></label>
    </div>

    <div class="desktop-toolbar">
      <button class="btn-new-folder" onclick="createFolder()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg> New Folder
      </button>
      <label class="btn-upload" for="filePicker">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg> Upload Files
      </label>
    </div>

    <input type="file" id="filePicker" style="display:none" multiple>

    <div class="upload-queue" id="uploadQueue" style="display:none"></div>

    <div class="file-area">
      <div class="empty-state" id="emptyState" style="display:none">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
        <p>No files here yet</p>
        <span>Upload files or create a folder</span>
      </div>
      <div class="file-grid" id="fileList"></div>
    </div>
  </main>
</div>

<div class="context-menu" id="contextMenu">
  <button onclick="ctxDownload()">⚙️ Download</button>
  <button onclick="ctxMove()">📂 Move to Folder</button>
  <button onclick="ctxSelect()">✓ Select</button>
  <hr>
  <button class="danger" onclick="ctxDelete()">🗑 Delete</button>
</div>

<div class="modal-overlay" id="moveModal" style="display:none" onclick="closeMoveModal(event)">
  <div class="modal">
    <h3>Move to Folder</h3>
    <div id="folderPickerList"></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="document.getElementById('moveModal').style.display='none'">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="inactiveToast" style="display:none">
  ⚠️ Logging out in <span id="toastTimer">60</span>s due to inactivity
</div>

<script src="script.js"></script>
</body>
</html>

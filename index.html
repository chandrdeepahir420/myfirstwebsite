<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TeleDrive">
<meta name="theme-color" content="#0f0f13" id="themeColor">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%236c63ff'/><path d='M20 38 L50 18 L80 38 V78 A4 4 0 0 1 76 82 H24 A4 4 0 0 1 20 82 Z' fill='white'/></svg>">
<title>TeleDrive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body class="dark">

<div id="loadingScreen" class="loading-screen">
  <div class="loader-content">
    <div class="loader-icon">
      <div class="loader-ring"></div>
      <i class="fa-solid fa-cloud text-3xl"></i>
    </div>
    <p>TeleDrive</p>
  </div>
</div>

<div id="loginScreen" class="login-screen" style="display:none">
  <div class="login-bg">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
  </div>
  <div class="login-card">
    <div class="theme-toggle-login" onclick="toggleTheme()">
      <span id="themeIconLogin">🌙</span>
    </div>
    <div class="login-logo">
      <i class="fa-solid fa-cloud-arrow-up text-xl"></i>
    </div>
    <h1>TeleDrive</h1>
    <p class="login-sub">Your personal cloud, powered by Telegram</p>

    <div id="step1">
      <div class="input-group">
        <label>Username</label>
        <input type="text" id="usernameInput" placeholder="Enter username" autocomplete="username" autocapitalize="none">
      </div>
      <div class="input-group">
        <label>Password</label>
        <div class="pass-wrap">
          <input type="password" id="passwordInput" placeholder="Enter password" autocomplete="current-password">
          <button class="eye-btn" onclick="togglePass()" type="button" tabindex="-1">
            <i class="fa-solid fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>
      <button class="btn-primary" id="loginBtn" onclick="requestOTP()">
        <span>Continue</span>
        <i class="fa-solid fa-arrow-right"></i>
      </button>
      <div class="login-error" id="loginError"></div>
    </div>

    <div id="step2" style="display:none">
      <div class="otp-info">
        <i class="fa-solid fa-paper-plane"></i>
        <span>OTP aapke Telegram par bheja gaya</span>
      </div>
      <div class="otp-inputs">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
      </div>
      <button class="btn-primary" id="verifyBtn" onclick="verifyOTP()">
        <span>Verify & Login</span>
        <i class="fa-solid fa-check"></i>
      </button>
      <button class="btn-ghost" onclick="backToStep1()">← Back</button>
      <div class="login-error" id="otpError"></div>
    </div>
  </div>
</div>

<div id="driveContent" style="display:none">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <i class="fa-solid fa-cloud text-blue-500"></i>
      <span>TeleDrive</span>
    </div>

    <nav class="sidebar-nav">
      <a class="nav-item active" id="navDrive" onclick="navigateTo('root')">
        <i class="fa-solid fa-house"></i> My Drive
      </a>
      <a class="nav-item" onclick="showSearch()">
        <i class="fa-solid fa-magnifying-glass"></i> Search
      </a>
    </nav>

    <div class="sidebar-bottom">
      <div class="storage-info">
        <i class="fa-solid fa-server"></i> Unlimited Storage
      </div>
      <button class="theme-toggle-btn" onclick="toggleTheme()">
        <span id="themeIconSidebar">🌙</span> <span id="themeLabel">Dark Mode</span>
      </button>
      <button class="btn-logout" onclick="logout()">
        <i class="fa-solid fa-right-from-bracket"></i> Logout
      </button>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <main class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="hamburger" onclick="toggleSidebar()">
          <i class="fa-solid fa-bars text-xl"></i>
        </button>
        <div class="breadcrumb" id="breadcrumb">
          <span onclick="navigateTo('root')">My Drive</span>
        </div>
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" onclick="showSearch()" id="searchToggle" title="Search">
          <i class="fa-solid fa-magnifying-glass"></i>
        </button>
        <button class="icon-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
        <button class="icon-btn" onclick="toggleView()" id="viewToggle" title="Toggle view">
          <i class="fa-solid fa-grid-2"></i>
        </button>
      </div>
    </div>

    <div class="search-row" id="searchRow" style="display:none">
      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" placeholder="Search files..." oninput="searchFiles()">
        <button onclick="hideSearch()">✕</button>
      </div>
    </div>

    <div class="action-bar" id="actionBar" style="display:none">
      <div class="action-bar-left">
        <button onclick="clearSelection()" class="ab-btn">✕</button>
        <span id="selectedCount">0 selected</span>
      </div>
      <div class="action-bar-right">
        <button class="ab-btn" onclick="bulkDownload()" title="Download"><i class="fa-solid fa-download"></i></button>
        <button class="ab-btn" onclick="bulkMove()" title="Move"><i class="fa-solid fa-folder-tree"></i></button>
        <button class="ab-btn danger" onclick="bulkDelete()" title="Delete"><i class="fa-solid fa-trash"></i></button>
        <button class="ab-btn" onclick="selectAll()">All</button>
      </div>
    </div>

    <div class="desktop-toolbar">
      <button class="btn-new-folder" onclick="createFolder()">
        <i class="fa-solid fa-folder-plus text-amber-500"></i> New Folder
      </button>
      <label class="btn-upload" for="filePicker">
        <i class="fa-solid fa-cloud-arrow-up"></i> Upload Files
      </label>
    </div>

    <input type="file" id="filePicker" style="display:none" multiple>

    <div class="upload-queue" id="uploadQueue" style="display:none"></div>

    <div class="file-area">
      <div class="empty-state" id="emptyState" style="display:none">
        <i class="fa-solid fa-folder-open text-5xl"></i>
        <p>No files here yet</p>
        <span>Upload files or create a folder</span>
      </div>
      <div class="file-grid" id="fileList"></div>
    </div>
  </main>
</div>

<div class="fab-group">
  <button class="fab fab-folder" onclick="createFolder()"><i class="fa-solid fa-folder-plus"></i></button>
  <label class="fab fab-upload" for="filePicker"><i class="fa-solid fa-plus"></i></label>
</div>

<div class="context-menu" id="contextMenu">
  <button onclick="ctxDownload()"><i class="fa-solid fa-download"></i> Download</button>
  <button onclick="ctxMove()"><i class="fa-solid fa-arrows-turn-to-dots"></i> Move to Folder</button>
  <button onclick="ctxSelect()"><i class="fa-solid fa-square-check"></i> Select</button>
  <hr>
  <button class="danger" onclick="ctxDelete()"><i class="fa-solid fa-trash"></i> Delete</button>
</div>

<div class="modal-overlay" id="moveModal" style="display:none" onclick="closeMoveModal(event)">
  <div class="modal">
    <h3>Move Selected Items</h3>
    <div id="folderPickerList"></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="document.getElementById('moveModal').style.display='none'">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="inactiveToast" style="display:none">
  <i class="fa-solid fa-triangle-exclamation animate-pulse"></i> 
  Logging out in <span id="toastTimer">60</span>s due to inactivity. Move mouse to cancel!
</div>

<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TeleDrive</title>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body class="dark">

<div id="loadingScreen" class="loading-screen"><div class="loader-ring"></div></div>

<div id="loginScreen" class="login-screen" style="display:none">
  <div class="login-card">
    <div class="login-logo"><i class="fa-solid fa-cloud text-3xl"></i></div>
    <h1>TeleDrive</h1><p class="login-sub">Secure Login</p>
    <div id="step1">
      <div class="input-group"><input type="text" id="usernameInput" placeholder="Username" autocomplete="off"></div>
      <div class="input-group pass-wrap"><input type="password" id="passwordInput" placeholder="Password"><button class="eye-btn" onclick="togglePass()"><i class="fa-solid fa-eye" id="eyeIcon"></i></button></div>
      <button class="btn-primary" id="loginBtn" onclick="requestOTP()">Continue</button>
      <div class="login-error" id="loginError"></div>
    </div>
    <div id="step2" style="display:none">
      <p style="text-align:center; font-size:0.85rem; color:var(--text-muted); margin-bottom:15px;">Enter OTP sent to Telegram</p>
      <div class="otp-inputs">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric"><input class="otp-box" type="text" maxlength="1" inputmode="numeric"><input class="otp-box" type="text" maxlength="1" inputmode="numeric">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric"><input class="otp-box" type="text" maxlength="1" inputmode="numeric"><input class="otp-box" type="text" maxlength="1" inputmode="numeric">
      </div>
      <button class="btn-primary" onclick="verifyOTP()">Verify</button>
      <div class="login-error" id="otpError"></div>
    </div>
  </div>
</div>

<div id="driveContent" style="display:none">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><i class="fa-solid fa-cloud text-blue-500"></i><span>TeleDrive</span></div>
    <nav class="sidebar-nav">
      <a class="nav-item active" id="navDrive" onclick="switchView('drive')"><i class="fa-solid fa-folder"></i> Browse</a>
      <a class="nav-item text-red-400" id="navTrash" onclick="switchView('trash')"><i class="fa-solid fa-trash-can"></i> Recently Deleted</a>
    </nav>
    <div class="sidebar-bottom"><button class="btn-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button></div>
  </aside>

  <main class="main-content">
    <div class="ios-header">
      <div class="ios-header-top">
        <div class="ios-back" id="backBtn" onclick="navigateUp()" style="visibility:hidden;"><i class="fa-solid fa-chevron-left"></i> Back</div>
        <div class="ios-actions">
          <label for="filePicker" class="ios-icon-btn"><i class="fa-solid fa-plus"></i></label>
          <button class="ios-icon-btn" onclick="createFolder()"><i class="fa-solid fa-folder-plus"></i></button>
          <button class="ios-icon-btn" onclick="toggleView()"><i class="fa-solid fa-ellipsis-circle"></i></button>
        </div>
      </div>
      <h1 class="ios-title" id="iosTitle">On My Drive</h1>
      <div class="search-box"><i class="fa-solid fa-magnifying-glass"></i><input type="text" id="searchInput" placeholder="Search" oninput="searchFiles()"></div>
    </div>

    <input type="file" id="filePicker" style="display:none" multiple>
    <div class="upload-queue" id="uploadQueue" style="display:none"></div>

    <div class="file-area">
      <div class="empty-state" id="emptyState" style="display:none"><i class="fa-solid fa-folder-open text-5xl"></i><p>No Files</p></div>
      <div class="file-grid list-view" id="fileList"></div>
    </div>
  </main>

  <div class="bottom-nav">
    <div class="nav-tab" onclick="alert('Recents coming soon!')"><i class="fa-regular fa-clock"></i><span>Recents</span></div>
    <div class="nav-tab" onclick="switchView('trash')"><i class="fa-regular fa-trash-can"></i><span>Deleted</span></div>
    <div class="nav-tab active" onclick="switchView('drive')"><i class="fa-regular fa-folder"></i><span>Browse</span></div>
  </div>

  <div class="action-bar" id="actionBar" style="display:none">
    <div class="ab-left"><button onclick="clearSelection()">Done</button></div>
    <div class="ab-center" id="selectedCount">1 Item</div>
    <div class="ab-right" id="actionBarTools"></div>
  </div>
</div>

<div class="context-menu" id="contextMenu"></div>
<div class="modal-overlay" id="renameModal" style="display:none;"><div class="modal"><h3>Rename</h3><input type="text" id="renameInput" class="rename-input"><div class="modal-actions"><button class="btn-ghost" onclick="document.getElementById('renameModal').style.display='none'">Cancel</button><button class="btn-primary" style="width:auto" onclick="submitRename()">Save</button></div></div></div>
<div class="modal-overlay preview-overlay" id="previewModal" style="display:none;"><div class="ios-header-top" style="padding:20px; width:100%;"><button class="ios-back" onclick="document.getElementById('previewModal').style.display='none'">Done</button></div><div class="preview-content-box" id="previewContent"></div><div class="preview-title" id="previewTitle"></div></div>

<script src="script.js"></script>
</body>
</html>

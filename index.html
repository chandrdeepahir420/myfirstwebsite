<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TeleDrive">
<meta name="theme-color" content="#0f0f13" id="themeColor">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%236c63ff'/><path d='M20 38 L50 18 L80 38 V78 A4 4 0 0 1 76 82 H24 A4 4 0 0 1 20 82 Z' fill='white'/></svg>">
<title>TeleDrive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body class="dark">

<div id="loadingScreen" class="loading-screen">
  <div class="loader-content">
    <div class="loader-ring"></div>
    <i class="fa-solid fa-cloud text-3xl text-blue-500"></i>
    <p>TeleDrive</p>
  </div>
</div>

<div id="loginScreen" class="login-screen" style="display:none">
  <div class="login-bg"><div class="blob blob1"></div><div class="blob blob2"></div><div class="blob blob3"></div></div>
  <div class="login-card">
    <div class="theme-toggle-login" onclick="toggleTheme()"><span id="themeIconLogin">🌙</span></div>
    <div class="login-logo"><i class="fa-solid fa-cloud-arrow-up text-xl"></i></div>
    <h1>TeleDrive</h1><p class="login-sub">Your personal cloud</p>
    <div id="step1">
      <div class="input-group"><label>Username</label><input type="text" id="usernameInput" placeholder="Enter username" autocomplete="off"></div>
      <div class="input-group"><label>Password</label>
        <div class="pass-wrap"><input type="password" id="passwordInput" placeholder="Enter password"><button class="eye-btn" onclick="togglePass()"><i class="fa-solid fa-eye" id="eyeIcon"></i></button></div>
      </div>
      <button class="btn-primary" id="loginBtn" onclick="requestOTP()"><span>Continue</span><i class="fa-solid fa-arrow-right"></i></button>
      <div class="login-error" id="loginError"></div>
    </div>
    <div id="step2" style="display:none">
      <div class="otp-info"><i class="fa-solid fa-paper-plane"></i><span>OTP aapke Telegram par bheja gaya</span></div>
      <div class="otp-inputs">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric"><input class="otp-box" type="text" maxlength="1" inputmode="numeric"><input class="otp-box" type="text" maxlength="1" inputmode="numeric">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric"><input class="otp-box" type="text" maxlength="1" inputmode="numeric"><input class="otp-box" type="text" maxlength="1" inputmode="numeric">
      </div>
      <button class="btn-primary" id="verifyBtn" onclick="verifyOTP()"><span>Verify & Login</span><i class="fa-solid fa-check"></i></button>
      <button class="btn-ghost" onclick="backToStep1()">← Back</button>
      <div class="login-error" id="otpError"></div>
    </div>
  </div>
</div>

<div id="driveContent" style="display:none">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><i class="fa-solid fa-cloud text-blue-500"></i><span>TeleDrive</span></div>
    <nav class="sidebar-nav">
      <a class="nav-item active" id="navDrive" onclick="switchView('drive')"><i class="fa-solid fa-house"></i> My Drive</a>
      <a class="nav-item" onclick="showSearch()"><i class="fa-solid fa-magnifying-glass"></i> Search</a>
      <a class="nav-item text-red-400 hover:text-red-500" id="navTrash" onclick="switchView('trash')"><i class="fa-solid fa-trash-can"></i> Trash Bin</a>
    </nav>
    <div class="sidebar-bottom">
      <button class="theme-toggle-btn" onclick="toggleTheme()"><span id="themeIconSidebar">🌙</span> <span id="themeLabel">Dark Mode</span></button>
      <button class="btn-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <main class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="hamburger" onclick="toggleSidebar()"><i class="fa-solid fa-bars text-xl"></i></button>
        <div class="breadcrumb" id="breadcrumb"><span onclick="navigateTo('root')">My Drive</span></div>
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" onclick="toggleView()" id="viewToggle" title="Toggle view"><i class="fa-solid fa-grid-2"></i></button>
      </div>
    </div>

    <div class="search-row" id="searchRow" style="display:none">
      <div class="search-box"><i class="fa-solid fa-magnifying-glass"></i><input type="text" id="searchInput" placeholder="Search files..." oninput="searchFiles()"><button onclick="hideSearch()">✕</button></div>
    </div>
    
    <div class="action-bar" id="actionBar" style="display:none">
      <div class="action-bar-left"><button onclick="clearSelection()" class="ab-btn">✕</button><span id="selectedCount">0 selected</span></div>
      <div class="action-bar-right" id="actionBarTools">
        </div>
    </div>

    <div class="desktop-toolbar" id="mainToolbar">
      <button class="btn-new-folder" onclick="createFolder()"><i class="fa-solid fa-folder-plus text-amber-500"></i> New Folder</button>
      <label class="btn-upload" for="filePicker"><i class="fa-solid fa-cloud-arrow-up"></i> Upload Files</label>
    </div>
    <input type="file" id="filePicker" style="display:none" multiple>

    <div class="upload-queue" id="uploadQueue" style="display:none"></div>
    <div class="file-area">
      <div class="empty-state" id="emptyState" style="display:none">
        <i class="fa-solid fa-folder-open text-5xl" id="emptyIcon"></i>
        <p id="emptyTitle">No files here</p><span id="emptyDesc">Upload files or create a folder</span>
      </div>
      <div class="file-grid" id="fileList"></div>
    </div>
  </main>
</div>

<div class="context-menu" id="contextMenu"></div>

<div class="modal-overlay" id="confirmModal" style="display:none; z-index: 3000;">
  <div class="modal text-center">
    <div class="modal-icon-box"><i class="fa-solid fa-triangle-exclamation"></i></div>
    <h3 id="confirmTitle" style="margin-bottom: 8px;">Are you sure?</h3>
    <p id="confirmDesc" style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 24px;">This action cannot be undone.</p>
    <div style="display:flex; gap:12px;">
      <button class="btn-ghost" style="flex:1; margin:0;" onclick="document.getElementById('confirmModal').style.display='none'">Cancel</button>
      <button class="btn-primary" style="flex:1; margin:0; background: var(--danger);" id="confirmYesBtn">Yes, do it</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="renameModal" style="display:none;">
    <div class="modal">
      <h3>Rename Item</h3>
      <input type="text" id="renameInput" class="rename-input" placeholder="New name...">
      <div class="modal-actions">
        <button class="btn-ghost" style="margin-top:0;" onclick="document.getElementById('renameModal').style.display='none'">Cancel</button>
        <button class="btn-primary" style="width: auto; margin-top:0; padding: 10px 20px;" onclick="submitRename()">Save Name</button>
      </div>
    </div>
</div>

<div class="modal-overlay preview-overlay" id="previewModal" style="display:none;">
    <button class="preview-close" onclick="document.getElementById('previewModal').style.display='none'"><i class="fa-solid fa-xmark"></i></button>
    <div class="preview-content-box" id="previewContent"></div>
    <div class="preview-title" id="previewTitle">filename.png</div>
</div>

<div class="modal-overlay" id="moveModal" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal">
    <h3>Move Selected Items</h3>
    <div id="folderPickerList" style="max-height: 250px; overflow-y: auto; margin-bottom: 16px;"></div>
    <div class="modal-actions"><button class="btn-ghost" style="margin:0;" onclick="document.getElementById('moveModal').style.display='none'">Cancel</button></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
